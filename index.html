<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Snoutley – Löydetty koira</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background-color: #fefefe;
      color: #333;
      display: flex;
      flex-direction: column;
    }
    @font-face {
      font-family: 'PawleyFont';
      src: url('Pawley-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.07;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      text-align: center;
      padding: 2rem 1rem 0;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 12vh;
    }
    .greeting {
      font-size: 1.25rem;
      color: #666;
      margin-bottom: 0.35rem;
      text-shadow: 0 0 12px #fefefe, 0 0 20px #fefefe, 0 0 30px #fefefe;
    }
    .pet-name {
      font-family: 'PawleyFont', sans-serif;
      font-size: 4.5rem;
      font-weight: normal;
      letter-spacing: 1px;
      margin: 0.5rem 0 1rem;
      text-transform: uppercase;
      text-shadow: 0 0 12px #fefefe, 0 0 20px #fefefe, 0 0 30px #fefefe;
    }
    .lost-message {
      font-size: 1.25rem;
      color: #666;
      margin-bottom: 3rem;
      text-shadow: 0 0 12px #fefefe, 0 0 20px #fefefe, 0 0 30px #fefefe;
    }
    .button {
      padding: 1.1rem 2.2rem;
      font-size: 1.35rem;
      font-weight: bold;
      color: #fff;
      background-color: #000;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      transition: background-color 0.3s;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .button:hover {
      background-color: #333;
    }
    .button-number {
      font-size: 1rem;
      font-weight: normal;
      opacity: 0.85;
    }
    .owner-info {
      margin-top: 1.75rem;
    }
    .info {
      font-size: 1.15rem;
      margin: 0.3rem 0;
      color: #444;
      text-shadow: 0 0 12px #fefefe, 0 0 20px #fefefe, 0 0 30px #fefefe;
    }
    .section-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 3rem;
      margin-bottom: 0.5rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-shadow: 0 0 12px #fefefe, 0 0 20px #fefefe, 0 0 30px #fefefe;
    }
    .allergy-info {
      font-size: 1.15rem;
      color: #444;
      text-shadow: 0 0 12px #fefefe, 0 0 20px #fefefe, 0 0 30px #fefefe;
    }
    .logo {
      max-width: 120px;
      margin-top: auto;
      margin-bottom: 1.5rem;
      padding-top: 2rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="container">
    <div class="content">
      <div id="output"></div>
      <div id="call-button"></div>
      <div class="owner-info" id="contact"></div>
      <div id="allergy"></div>
    </div>
    <img src="snoutley.svg" alt="Snoutley logo" class="logo">
  </div>
  <script>
    const output = document.getElementById("output");
    const callButton = document.getElementById("call-button");
    const contact = document.getElementById("contact");
    const allergy = document.getElementById("allergy");
    const lang = navigator.language.startsWith("sv") ? "sv" :
                 navigator.language.startsWith("fi") ? "fi" : "en";
    const raw = location.hash.substring(1).replace(/\+/g, ' ');
    const data = decodeURIComponent(raw).split("|");
    if (data.length >= 4) {
      const [name, phone, dog, allergyVal] = data;
      const translations = {
        fi: {
          greeting: "Hei! Nimeni on:",
          lostMessage: "Olen eksynyt, ole hyvä ja ota yhteyttä omistajaani.",
          owner: `Omistaja: ${name}`,
          button: "Soita omistajalle",
          infoLabel: "Tärkeää tietoa",
        },
        sv: {
          greeting: "Hej! Mitt namn är:",
          lostMessage: "Jag är vilse, kontakta gärna min ägare.",
          owner: `Ägare: ${name}`,
          button: "Ring ägaren",
          infoLabel: "Viktig information",
        },
        en: {
          greeting: "Hi! My name is:",
          lostMessage: "I'm lost, please contact my owner.",
          owner: `Owner: ${name}`,
          button: "Call owner",
          infoLabel: "Important info",
        }
      };
      const t = translations[lang];
      output.innerHTML = `
        <div class="greeting">${t.greeting}</div>
        <div class="pet-name">${dog}</div>
        <div class="lost-message">${t.lostMessage}</div>
      `;
      callButton.innerHTML = `
        <a class="button" href="tel:${phone}">
          <span>${t.button}</span>
          <span class="button-number">${phone}</span>
        </a>`;
      contact.innerHTML = `
        <div class="info">${t.owner}</div>
      `;
      allergy.innerHTML = `
        <div class="section-title">${t.infoLabel}</div>
        <div class="allergy-info">${allergyVal}</div>
      `;
    } else {
      output.innerHTML = `<p>Virhe: tietojen lukeminen epäonnistui.</p>`;
    }

    // Seeded random — always produces the same pattern
    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 16807 + 0) % 2147483647;
        return (s - 1) / 2147483646;
      };
    }
    const rand = seededRandom(42);

    // Background pattern
    const canvas = document.getElementById("bg-canvas");
    const ctx = canvas.getContext("2d");
    const img = new Image();
    img.src = "favicon.svg";
    img.onload = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const iconSize = 36;
      const spacing = 90;
      const cols = Math.ceil(canvas.width / spacing) + 2;
      const rows = Math.ceil(canvas.height / spacing) + 2;
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const x = col * spacing + (rand() * 20 - 10);
          const y = row * spacing + (col % 2 === 0 ? 0 : spacing / 2) + (rand() * 20 - 10);
          const angle = rand() * Math.PI * 2;
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle);
          ctx.drawImage(img, -iconSize / 2, -iconSize / 2, iconSize, iconSize);
          ctx.restore();
        }
      }
    };
  </script>
</body>
</html>
