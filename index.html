<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Snoutley – Löydetty koira</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background-color: #fefefe;
      color: #333;
      display: flex;
      flex-direction: column;
    }
    @font-face {
      font-family: 'PawleyFont';
      src: url('Pawley-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    .bg-pattern {
      position: fixed;
      inset: 0;
      background-image: url('50x65.svg');
      background-repeat: repeat;
      background-size: 160px 160px;
      background-position: 40px 40px;
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .greeting {
      font-size: 1.1rem;
      color: #666;
      margin-top: 3rem;
      margin-bottom: 0.25rem;
    }
    .pet-name {
      font-family: 'PawleyFont', sans-serif;
      font-size: 4rem;
      font-weight: normal;
      letter-spacing: 1px;
      margin: 0 0 0.5rem;
      text-transform: uppercase;
    }
    .lost-message {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 2.5rem;
    }
    .button {
      padding: 1rem 2rem;
      font-size: 1.25rem;
      font-weight: bold;
      color: #fff;
      background-color: #000;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      transition: background-color 0.3s;
      display: inline-block;
    }
    .button:hover {
      background-color: #333;
    }
    .owner-info {
      margin-top: 1.5rem;
      margin-bottom: 0;
    }
    .info {
      font-size: 1.05rem;
      margin: 0.2rem 0;
      color: #444;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 3rem;
      margin-bottom: 0.4rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .allergy-info {
      font-size: 1.05rem;
      color: #444;
      margin-bottom: 0;
    }
    .logo {
      max-width: 120px;
      margin-top: auto;
      padding-top: 3rem;
      margin-bottom: 2rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="container">
    <div id="output"></div>
    <div id="call-button"></div>
    <div class="owner-info" id="contact"></div>
    <div id="allergy"></div>
    <img src="snoutley.svg" alt="Snoutley logo" class="logo">
  </div>
  <script>
    const output = document.getElementById("output");
    const callButton = document.getElementById("call-button");
    const contact = document.getElementById("contact");
    const allergy = document.getElementById("allergy");
    const lang = navigator.language.startsWith("sv") ? "sv" :
                 navigator.language.startsWith("fi") ? "fi" : "en";
    const raw = location.hash.substring(1).replace(/\+/g, ' ');
    const data = decodeURIComponent(raw).split("|");
    if (data.length >= 4) {
      const [name, phone, dog, allergyVal] = data;
      const translations = {
        fi: {
          greeting: "Hei! Nimeni on:",
          lostMessage: "Olen eksynyt, ole hyvä ja ota yhteyttä omistajaani.",
          owner: `Omistaja: ${name}`,
          phone: `${phone}`,
          button: "Soita omistajalle",
          infoLabel: "Tärkeää tietoa",
        },
        sv: {
          greeting: "Hej! Mitt namn är:",
          lostMessage: "Jag är vilse, kontakta gärna min ägare.",
          owner: `Ägare: ${name}`,
          phone: `${phone}`,
          button: "Ring ägaren",
          infoLabel: "Viktig information",
        },
        en: {
          greeting: "Hi! My name is:",
          lostMessage: "I'm lost, please contact my owner.",
          owner: `Owner: ${name}`,
          phone: `${phone}`,
          button: "Call owner",
          infoLabel: "Important info",
        }
      };
      const t = translations[lang];
      output.innerHTML = `
        <div class="greeting">${t.greeting}</div>
        <div class="pet-name">${dog}</div>
        <div class="lost-message">${t.lostMessage}</div>
      `;
      callButton.innerHTML = `<a class="button" href="tel:${phone}">${t.button}</a>`;
      contact.innerHTML = `
        <div class="info">${t.owner}</div>
        <div class="info">${t.phone}</div>
      `;
      allergy.innerHTML = `
        <div class="section-title">${t.infoLabel}</div>
        <div class="allergy-info">${allergyVal}</div>
      `;
    } else {
      output.innerHTML = `<p>Virhe: tietojen lukeminen epäonnistui.</p>`;
    }
  </script>
</body>
</html>
